<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Trainer</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0a0b12" />

  <!-- iOS home-screen support (iOS ignores most of the manifest) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- "black" reserves space for the status bar / notch instead of drawing under it -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Trainer" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- App shell. Screens render into #view; nav hidden during onboarding. -->
  <div id="app">
    <header id="appbar" hidden>
      <h1 id="appbar-title">Today</h1>
      <div id="appbar-right"></div>
    </header>

    <main id="view" aria-live="polite"><!-- screens render here --></main>

    <nav id="tabbar" hidden>
      <button class="tab" data-route="today" type="button">
        <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 9v6M9.5 7.5v9M14.5 7.5v9M17.5 9v6M9.5 12h5"/></svg>
        <span>Today</span>
      </button>
      <button class="tab" data-route="calendar" type="button">
        <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3"/></svg>
        <span>Calendar</span>
      </button>
      <button class="tab" data-route="plan" type="button">
        <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 7h14M5 12h14M5 17h9"/></svg>
        <span>Plan</span>
      </button>
      <button class="tab" data-route="progress" type="button">
        <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5v14h16"/><path d="M7.5 14.5l3.5-4 3 2.5 4.5-6"/></svg>
        <span>Progress</span>
      </button>
    </nav>
  </div>

  <noscript>This app needs JavaScript enabled.</noscript>
  <script type="module" src="js/app.js"></script>
</body>
</html>
