<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Trainer</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0f14" />

  <!-- iOS home-screen support (iOS ignores most of the manifest) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trainer" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- App shell. Screens render into #view; nav hidden during onboarding. -->
  <div id="app">
    <header id="appbar" hidden>
      <h1 id="appbar-title">Today</h1>
      <div id="appbar-right"></div>
    </header>

    <main id="view" aria-live="polite"><!-- screens render here --></main>

    <nav id="tabbar" hidden>
      <button class="tab" data-route="today"    type="button"><span class="tab-ico">●</span><span>Today</span></button>
      <button class="tab" data-route="calendar" type="button"><span class="tab-ico">▦</span><span>Calendar</span></button>
      <button class="tab" data-route="plan"     type="button"><span class="tab-ico">▤</span><span>Plan</span></button>
      <button class="tab" data-route="progress" type="button"><span class="tab-ico">◔</span><span>Progress</span></button>
    </nav>
  </div>

  <noscript>This app needs JavaScript enabled.</noscript>
  <script type="module" src="js/app.js"></script>
</body>
</html>
